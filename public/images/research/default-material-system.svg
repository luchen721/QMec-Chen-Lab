      <circle cx="355" cy="112" r="21" fill="#af5b32"/>
      <circle cx="520" cy="185" r="28" fill="#237fa8"/>
      <circle cx="685" cy="112" r="21" fill="#af5b32"/>
      <circle cx="835" cy="185" r="24" fill="#237fa8"/>
      <circle cx="190" cy="345" r="22" fill="#af5b32"/>
      <circle cx="355" cy="433" r="26" fill="#237fa8"/>
      <circle cx="520" cy="345" r="30" fill="#af5b32"/>
      <circle cx="685" cy="433" r="26" fill="#237fa8"/>
      <circle cx="835" cy="345" r="22" fill="#af5b32"/>
