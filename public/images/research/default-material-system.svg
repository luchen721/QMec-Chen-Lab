      <ellipse cx="685" cy="112" rx="70" ry="36" fill="url(#orbitalCopper)" transform="rotate(18 685 112)"/>
      <ellipse cx="835" cy="185" rx="82" ry="40" fill="url(#orbitalBlue)" transform="rotate(-18 835 185)"/>
      <ellipse cx="355" cy="433" rx="80" ry="38" fill="url(#orbitalCopper)" transform="rotate(-10 355 433)"/>
      <ellipse cx="520" cy="345" rx="96" ry="46" fill="url(#orbitalBlue)" transform="rotate(14 520 345)"/>
      <ellipse cx="685" cy="433" rx="80" ry="38" fill="url(#orbitalCopper)" transform="rotate(-10 685 433)"/>
