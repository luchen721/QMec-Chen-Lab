<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 640" role="img" aria-labelledby="title desc">
  <title id="title">Default quantum material mockup illustration</title>
  <desc id="desc">A stylized crystalline lattice with quantum wave contours and orbital highlights.</desc>
  <defs>
    <linearGradient id="background" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f7fbff"/>
      <stop offset="0.5" stop-color="#dfeef6"/>
      <stop offset="1" stop-color="#f8f2e8"/>
    </linearGradient>
    <radialGradient id="orbitalBlue" cx="50%" cy="45%" r="62%">
      <stop offset="0" stop-color="#75d8ff" stop-opacity="0.86"/>
      <stop offset="0.62" stop-color="#2b86b8" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#1f4f6f" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orbitalCopper" cx="50%" cy="45%" r="62%">
      <stop offset="0" stop-color="#f6b35f" stop-opacity="0.9"/>
      <stop offset="0.55" stop-color="#b25d34" stop-opacity="0.36"/>
      <stop offset="1" stop-color="#7a3426" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#19313f" flood-opacity="0.16"/>
    </filter>
    <pattern id="grid" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M80 0H0v80" fill="none" stroke="#ffffff" stroke-opacity="0.58" stroke-width="2"/>
